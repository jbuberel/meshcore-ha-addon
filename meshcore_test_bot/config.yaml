name: "MeshCore Test Bot"
description: "Monitors a MeshCore device for messages on a channel and sends auto-replies."
version: "1.5.0"
slug: "meshcore_test_bot"
url: "https://github.com/jbuberel/meshcore-ha-addon"

arch:
  - aarch64
  - amd64
  - armhf
  - armv7

startup: application
boot: auto
init: false

image: "ghcr.io/jbuberel/meshcore-ha-addon/{arch}-meshcore_test_bot"

options:
  serial_port: "/dev/serial/by-id/usb-RAKwireless_WisCore_RAK4631_Board_A6055CC4E20C32E2-if00"
  baudrate: 115200
  channel_name: "#test"
  channel_idx: 1
  trigger_text: "test"
  dm_trigger_text: "test"
  device_name: ""
  time_sync_enabled: false
  time_sync_at: "03:30"
  time_sync_devices: []

schema:
  serial_port: str
  baudrate: int
  channel_name: str
  channel_idx: int
  trigger_text: str
  dm_trigger_text: str
  device_name: str
  time_sync_enabled: bool
  time_sync_at: str
  time_sync_devices:
    - pubkey: str
      password: password
      name: str?

# uart: true auto-discovers serial/UART devices and grants the container the
# correct cgroup device permissions (fixes "Operation not permitted" / EPERM).
uart: true

# Explicitly map the device as well, so the cgroup allow-rule is created even
# if auto-discovery misses it.
devices:
  - "/dev/ttyACM0"

map:
  - config:rw

# Ask the Supervisor for MQTT broker credentials (e.g. the Mosquitto add-on).
# `want` (not `need`) keeps this optional: without a broker the add-on still
# runs, it just skips publishing the "Sync Now" dashboard button entity.
services:
  - mqtt:want

# Ingress-only web UI (sidebar panel) with a "Sync Now" button for the time
# sync feature. No `panel_admin` flag is set, so it's visible and usable to
# any Home Assistant user with dashboard access, not just admins. It is not
# exposed via `ports:`, so it is reachable only through HA's authenticated
# ingress proxy, never directly on the LAN.
ingress: true
ingress_port: 8099

panel_icon: mdi:antenna
