name: "MeshCore Test Bot"
description: "Monitors a MeshCore device for messages on a channel and sends auto-replies."
version: "1.0.2"
slug: "meshcore_test_bot"
url: "https://github.com/jbuberel/meshcore-ha-addon"

arch:
  - aarch64
  - amd64
  - armhf
  - armv7

startup: application
boot: auto
init: false

image: "ghcr.io/jbuberel/meshcore-ha-addon/{arch}-meshcore_test_bot"

options:
  serial_port: "/dev/ttyUSB0"
  baudrate: 115200
  channel_idx: 1
  trigger_text: "test"
  device_name: ""

schema:
  serial_port: str
  baudrate: int
  channel_idx: int
  trigger_text: str
  device_name: str

devices:
  - "/dev/ttyUSB0"

map:
  - config:rw

panel_icon: mdi:antenna
