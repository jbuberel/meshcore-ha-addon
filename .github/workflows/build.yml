name: Build and Publish Add-on

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

env:
  ADDON_SLUG: meshcore_test_bot
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/meshcore-ha-addon

jobs:
  build:
    name: Build ${{ matrix.arch }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    strategy:
      matrix:
        arch:
          - aarch64
          - amd64
          - armhf
          - armv7

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Read add-on version
        id: addon_version
        run: |
          VERSION=$(grep '^version:' ${{ env.ADDON_SLUG }}/config.yaml | awk '{print $2}' | tr -d '"')
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Extract build base image
        id: build_from
        run: |
          BUILD_FROM=$(grep '^\s*${{ matrix.arch }}:' ${{ env.ADDON_SLUG }}/build.yaml \
            | awk '{print $2}' | tr -d '"')
          echo "image=${BUILD_FROM}" >> "$GITHUB_OUTPUT"

      - name: Resolve Docker platform for arch
        id: platform
        run: |
          case "${{ matrix.arch }}" in
            amd64)   echo "platform=linux/amd64"   >> "$GITHUB_OUTPUT" ;;
            aarch64) echo "platform=linux/arm64"   >> "$GITHUB_OUTPUT" ;;
            armv7)   echo "platform=linux/arm/v7"  >> "$GITHUB_OUTPUT" ;;
            armhf)   echo "platform=linux/arm/v6"  >> "$GITHUB_OUTPUT" ;;
          esac

      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: ./${{ env.ADDON_SLUG }}
          platforms: ${{ steps.platform.outputs.platform }}
          push: ${{ github.event_name != 'pull_request' }}
          build-args: |
            BUILD_FROM=${{ steps.build_from.outputs.image }}
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/${{ matrix.arch }}-${{ env.ADDON_SLUG }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/${{ matrix.arch }}-${{ env.ADDON_SLUG }}:${{ steps.addon_version.outputs.version }}
          cache-from: type=gha,scope=${{ matrix.arch }}
          cache-to: type=gha,mode=max,scope=${{ matrix.arch }}
          labels: |
            org.opencontainers.image.title=MeshCore Test Bot (${{ matrix.arch }})
            org.opencontainers.image.version=${{ steps.addon_version.outputs.version }}
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}

  release:
    name: Tag and Release
    runs-on: ubuntu-latest
    needs: build
    # Auto-tag and release from config.yaml on every push to main. The
    # tag-existence check below makes this a no-op when main is pushed without a
    # version bump, so no manual `git tag` step is ever needed.
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Read add-on version
        id: addon_version
        run: |
          VERSION=$(grep '^version:' ${{ env.ADDON_SLUG }}/config.yaml | awk '{print $2}' | tr -d '"')
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Check whether tag already exists
        id: tagcheck
        run: |
          TAG="v${{ steps.addon_version.outputs.version }}"
          if git ls-remote --exit-code --tags origin "refs/tags/${TAG}" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "Tag ${TAG} already exists — skipping tag and release."
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "Tag ${TAG} does not exist — creating tag and release."
          fi

      # action-gh-release creates the tag (at target_commitish) when it doesn't
      # already exist, so this single step produces both the tag and the release.
      # Note: tags created via GITHUB_TOKEN do not re-trigger this workflow, so
      # there is no risk of a build loop.
      - name: Create tag and GitHub Release
        if: steps.tagcheck.outputs.exists == 'false'
        uses: softprops/action-gh-release@v3
        with:
          tag_name: "v${{ steps.addon_version.outputs.version }}"
          target_commitish: ${{ github.sha }}
          name: "v${{ steps.addon_version.outputs.version }}"
          body: |
            ## MeshCore Test Bot ${{ steps.addon_version.outputs.version }}

            Docker images published to GHCR for: `amd64`, `aarch64`, `armv7`, `armhf`

            ### Installation
            Add this repository to Home Assistant:
            `https://github.com/${{ github.repository }}`
          generate_release_notes: true
